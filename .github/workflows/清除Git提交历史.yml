name: 清除Git提交历史

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '输入 "yes" 确认删除全部历史（不可逆）'
        required: true
        default: 'no'

jobs:
  purge:
    if: ${{ github.event.inputs.confirm == 'yes' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许推送
    steps:
      - name: 检出当前文件（仅最新版本）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1        # 不需要历史记录

      - name: 删除 .git 并重建仓库
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # 配置提交者身份
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          echo "默认分支: $DEFAULT_BRANCH"

          # 1. 删除原有 .git 目录（清空全部历史）
          rm -rf .git

          # 2. 重新初始化仓库
          git init

          # 3. 添加远程仓库（使用 GITHUB_TOKEN 认证）
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # 4. 提交所有文件（单一初始提交）
          git add -A
          git commit -m "Initial commit (history purged)"

          # 5. 重命名当前分支为默认分支名
          git branch -M "$DEFAULT_BRANCH"

          # 6. 强制推送（覆盖远端历史）
          git push -f origin "$DEFAULT_BRANCH"
