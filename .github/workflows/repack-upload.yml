name: 下载、重新打包并上传到 Release

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: >
          JSON 数组，每个元素包含 url, output_name, password。
          示例：[{"url":"https://...", "output_name":"MyApp", "password":"123"}]
        required: true
        type: string
      tag:
        description: '目标 Release 的 tag（如 v1.7），不存在则自动创建'
        required: true
        type: string
        default: 'latest'

permissions:
  contents: write

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 p7zip-full
        run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full

      - name: 处理所有任务
        shell: bash
        env:
          TASKS_JSON: ${{ github.event.inputs.tasks }}
          TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 清理可能的 Windows 换行符，防止隐藏 \r 干扰
          export TASKS_JSON="$(printf '%s' "$TASKS_JSON" | tr -d '\r')"

          # 容错：移除 JSON 数组/对象末尾多余逗号（支持多行）
          export TASKS_JSON="$(printf '%s' "$TASKS_JSON" | sed -Ez 's/,\s*(]|})/\1/g')"

          COUNT=$(jq -n 'env.TASKS_JSON | fromjson | length')
          echo "共有 ${COUNT} 个任务"

          # 确保 release 存在
          if ! gh release view "${TAG}" &>/dev/null; then
            echo "创建 release: ${TAG}"
            gh release create "${TAG}" --title "${TAG}" --notes "自动化重新打包上传"
          else
            echo "release ${TAG} 已存在，将上传 asset"
          fi

          # 逐个任务处理，子 shell 隔离错误并即时清理
          for ((idx=0; idx<COUNT; idx++)); do
            echo "========================================="
            echo ">>> 任务 $((idx+1))/${COUNT}"

            (
              set -euo pipefail

              URL=$(jq -rn --argjson i "$idx" 'env.TASKS_JSON | fromjson | .[$i].url')
              OUTPUT_NAME=$(jq -rn --argjson i "$idx" 'env.TASKS_JSON | fromjson | .[$i].output_name')
              PASSWORD=$(jq -rn --argjson i "$idx" 'env.TASKS_JSON | fromjson | .[$i].password // ""')

              if [[ -z "$URL" || -z "$OUTPUT_NAME" ]]; then
                echo "错误：url 或 output_name 为空，跳过"
                exit 0
              fi

              TASK_DIR=$(mktemp -d -t task-XXXXX)
              echo "临时目录：$TASK_DIR"
              cleanup() { echo "清理 $TASK_DIR"; rm -rf "$TASK_DIR"; }
              trap cleanup EXIT

              cd "$TASK_DIR"

              # 下载（重试三次）
              echo "下载：$URL"
              for i in 1 2 3; do
                if curl -fsSL --retry 2 -o download.pkg "$URL"; then
                  echo "下载成功"
                  break
                else
                  echo "重试 $i ..."
                  sleep 5
                fi
              done
              [[ -f download.pkg ]] || { echo "下载失败"; exit 1; }

              # 解压（带密码支持）
              echo "解压..."
              mkdir -p extract
              if [[ -n "$PASSWORD" ]]; then
                7z x -oextract -p"$PASSWORD" download.pkg -y
              else
                7z x -oextract download.pkg -y
              fi

              # 重组为单层文件夹
              echo "重组文件夹结构..."
              mapfile -t items < <(find extract -mindepth 1 -maxdepth 1)
              if [[ ${#items[@]} -eq 1 ]] && [[ -d "${items[0]}" ]]; then
                echo "检测到唯一子目录，上提内容到 ${OUTPUT_NAME}/"
                mkdir -p "${OUTPUT_NAME}"
                mv "${items[0]}"/* "${items[0]}"/.[!.]* "${OUTPUT_NAME}"/ 2>/dev/null || true
              else
                echo "多文件或非目录，将 extract 作为 ${OUTPUT_NAME}/"
                mv extract "${OUTPUT_NAME}"
              fi
              [[ -d "${OUTPUT_NAME}" ]] || { echo "重组失败"; exit 1; }

              # 分卷压缩（zip，最高压缩率，每卷1.9G）
              echo "最高压缩率分卷 ZIP (每卷 1.9G)..."
              7z a -tzip -v1900m -mx=9 "${OUTPUT_NAME}.zip" "${OUTPUT_NAME}/"

              # 收集所有分卷文件（修正通配符问题）
              echo "上传到 release..."
              ASSETS=()
              # 主 zip 文件
              if [[ -f "${OUTPUT_NAME}.zip" ]]; then
                ASSETS+=("${OUTPUT_NAME}.zip")
              fi
              # 分卷文件 .z01, .z02 等（使用 find 安全处理特殊字符）
              while IFS= read -r -d '' file; do
                ASSETS+=("$file")
              done < <(find . -maxdepth 1 -name "${OUTPUT_NAME}.z[0-9][0-9]" -print0 2>/dev/null || true)

              if [[ ${#ASSETS[@]} -eq 0 ]]; then
                echo "无分卷文件"
                exit 1
              fi
              gh release upload "${TAG}" "${ASSETS[@]}" --clobber

              echo "任务完成：$OUTPUT_NAME"
              # 子shell退出时 trap 自动清理
            ) || echo "⚠️ 任务 $idx 失败，继续下一个"
          done

          echo "所有任务处理完毕"
